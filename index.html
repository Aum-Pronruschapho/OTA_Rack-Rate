<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA_Rack Rate - Impress Hotel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-section { background: #1a252f; color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; }
        h2 { margin-top: 0; letter-spacing: 1px; }
        .date-picker { font-size: 18px; padding: 10px 15px; border: 2px solid #34495e; border-radius: 8px; outline: none; cursor: pointer; color: #2c3e50; font-family: inherit; margin-top: 15px; font-weight: bold; }
        .date-picker:focus { border-color: #3498db; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid #2980b9; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        
        .room-type { font-size: 20px; font-weight: bold; margin: 0 0 8px 0; color: #2c3e50; }
        .price-label { font-size: 13px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px; }
        .price { font-size: 28px; font-weight: bold; color: #1a252f; margin: 5px 0 12px 0; }
        .available { font-size: 14px; font-weight: bold; padding: 6px 12px; border-radius: 4px; display: inline-block; background-color: #f8f9fa; color: #7f8c8d; border: 1px solid #dee2e6; }

        .loading { text-align: center; font-size: 18px; color: #666; grid-column: 1 / -1; }
        .no-data { text-align: center; font-size: 18px; color: #e74c3c; grid-column: 1 / -1; background: white; padding: 20px; border-radius: 8px; border-left: 6px solid #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h2>📊 OTA_Rack Rate Dashboard</h2>
        <p style="margin:0; color:#bdc3c7;">เลือกวันที่ต้องการอัปเดต Channel Manager</p>
        <input type="date" id="dateSelector" class="date-picker">
    </div>
    
    <div id="cardsContainer" class="cards-grid">
        <div class="loading">กำลังดึงข้อมูล Rate...</div>
    </div>
</div>

<script>
    // ลิงก์ CSV ของคุณอั้ม
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQksmZ8EHWQzPN459EmnppV8nMgBphWZRvHX8uNDxb1UHPpGNQB-LPHM4Giha7CxhVaNCKaXX8vsxG3/pub?gid=1864535639&single=true&output=csv';
    let hotelData = [];

    function parseCSVRow(row) {
        const matches = row.match(/(\s*"[^"]+"\s*|\s*[^,]+|,)(?=,|$)/g);
        if (!matches) return [];
        return matches.map(m => m.replace(/^"|"$/g, '').trim()).filter(m => m !== ',');
    }

    function renderCards(selectedDate) {
        const container = document.getElementById('cardsContainer');
        const [year, month, day] = selectedDate.split('-');
        
        const format1 = `${day}/${month}/${year}`;
        const format2 = `${parseInt(month)}/${parseInt(day)}/${year}`;
        const format3 = `${parseInt(day)}/${parseInt(month)}/${year}`;
        
        const filteredData = hotelData.filter(item => 
            item.date === format1 || item.date === format2 || item.date === format3 || item.date === selectedDate
        );

        if (filteredData.length === 0) {
            container.innerHTML = `<div class="no-data">ไม่พบข้อมูล Rate สำหรับวันที่เลือก</div>`;
            return;
        }

        let html = '';
        filteredData.forEach(room => {
            // ปรับข้อความห้องว่างให้ดูเป็นข้อมูล Support สำหรับคนทำงาน
            let availText = `Allotment: ${room.available} ห้อง`;
            if(room.available <= 0) availText = '⚠️ ปิดขาย (Stop Sell)';

            html += `
                <div class="card">
                    <h3 class="room-type">${room.type}</h3>
                    <div class="price-label">Rack Rate (OTA)</div>
                    <div class="price">${room.rackRate}</div>
                    <div class="available">${availText}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    fetch(sheetCsvUrl)
        .then(response => response.text())
        .then(csvText => {
            const rows = csvText.split('\n');
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].trim() === '') continue;
                const cols = parseCSVRow(rows[i]);
                
                if (cols.length >= 9) {
                    hotelData.push({
                        date: cols[0] ? cols[0].trim() : '',                           
                        type: cols[3] ? cols[3].trim() : '',                           
                        available: parseInt(cols[8] ? cols[8].trim() : "0", 10),       
                        
                        // ⚠️ จุดสำคัญ: กำหนดคอลัมน์ของราคา Rack Rate
                        // ตอนนี้ผมตั้งให้ดึงจากคอลัมน์ J (Index 9) สมมติว่าเป็น Base Rate
                        // หากของคุณอั้มอยู่คอลัมน์อื่น ให้เปลี่ยนเลข 9 เป็นเลขตามนี้ครับ:
                        // J=9, K=10, L=11, M=12, N=13, O=14
                        rackRate: cols[9] ? cols[9].trim() : '0'                        
                    });
                }
            }
            
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('dateSelector');
            dateInput.value = today;
            renderCards(today);
            
            dateInput.addEventListener('change', (e) => {
                renderCards(e.target.value);
            });
        })
        .catch(error => {
            document.getElementById('cardsContainer').innerHTML = '<div class="no-data">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            console.error('Error:', error);
        });
</script>
</body>
</html>

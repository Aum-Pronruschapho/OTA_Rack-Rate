<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTA Rack Rate - Channel Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header-section { background: #1a252f; color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; }
        h2 { margin-top: 0; letter-spacing: 1px; color: #f1c40f; }
        .date-picker { font-size: 18px; padding: 10px 15px; border: 2px solid #34495e; border-radius: 8px; outline: none; cursor: pointer; color: #2c3e50; font-family: inherit; margin-top: 15px; font-weight: bold; }
        .date-picker:focus { border-color: #3498db; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 8px solid #e67e22; transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        
        /* Column 4: ประเภทห้อง */
        .room-type { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; text-align: center; border-bottom: 2px dashed #ecf0f1; padding-bottom: 10px; }
        
        /* Column 14: OTA Rate (ทำให้เด่นที่สุด) */
        .main-price-box { text-align: center; margin: 15px 0; padding: 15px 0; background-color: #fff9f5; border-radius: 8px; }
        .price-label { font-size: 14px; color: #e67e22; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .price-massive { font-size: 56px; font-weight: 900; color: #d35400; line-height: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        
        /* ข้อมูลประกอบ Column 10 และ Column 9 */
        .secondary-info { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ecf0f1; }
        .rack-rate { font-size: 16px; color: #7f8c8d; }
        .rack-rate b { color: #34495e; font-size: 18px; }
        
        .available { font-size: 15px; font-weight: bold; padding: 6px 12px; border-radius: 6px; background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .stop-sell { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; }

        .loading { text-align: center; font-size: 18px; color: #666; grid-column: 1 / -1; }
        .error-box { text-align: center; font-size: 18px; color: #c62828; grid-column: 1 / -1; background: #ffebee; padding: 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>

    </div>
    
    <div id="cardsContainer" class="cards-grid">

    </div>
</div>
